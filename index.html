<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiệp cưới Văn Huy & Lê Phương</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- INTRO -->
    <section id="intro">
      <!-- glow -->
      <div class="bg-glow"></div>

      <!-- song hỷ -->
      <div class="double-happiness left">囍</div>
      <div class="double-happiness right">囍</div>

      <!-- particles -->
      <div class="particles"></div>

      <!-- cover -->
      <div class="cover-wrapper">
        <img
          src="assets/cover.jpg"
          alt="Thiệp cưới Văn Huy & Lê Phương"
          class="cover-card"
        />

        <button id="openBtn" class="open-btn">Mở Thiệp</button>
      </div>
    </section>

    <!-- MUSIC -->
    <audio id="bgMusic" src="assets/music/wedding.mp3" loop></audio>

    <!-- MUSIC TOGGLE -->
    <button id="musicToggle" class="music-toggle">🔊</button>

    <!-- MAIN -->
    <main class="container" id="mainContent">
      <img src="assets/1.jpg" alt="" />
      <img src="assets/2.jpg" alt="" />
      <img src="assets/3.jpg" alt="" />
      <img src="assets/4.jpg" alt="" />
      <img src="assets/5.jpg" alt="" />
      <img src="assets/6.4.jpg" alt="" />
    </main>

    <script src="script.js"></script>
  </body>
</html>
